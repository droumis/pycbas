[workspace]
name = "pycbas"
version = "0.1.0"
description = "Choice-Wide Behavioral Association Study"
channels = ["conda-forge"]
platforms = ["osx-arm64"]

[dependencies]
python = ">=3.11"
numpy = ">=1.24"
pytest = ">=7"
matplotlib = ">=3.7"
numba = ">=0.59"

[tasks]
test = "python -m pytest tests/test_cbas.py -v"
validate = "python scripts/validate.py"
figures = "python scripts/validate.py --figures-only"
validate-paper = "python scripts/validate.py --paper-params"
figures-paper = "python scripts/validate.py --figures-only --paper-params"
benchmark = "python scripts/benchmark.py"
benchmark-quick = "python scripts/benchmark.py --quick"
